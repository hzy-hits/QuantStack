# Manual holdings ledger — operator-edited.
#
# Update this when you OPEN / CLOSE / RESIZE a position. The daily report
# reads it and appends a "持仓→目标" delta to the Action column so PRESS-day
# (R=0.35x) shows e.g. "buy ... · 减 -0.081R(-65%, 0.125→0.044)" instead
# of just the new target size.
#
# Values are book R units. 0.125 = one standard HEDGE-day basket slot in
# the 4-name US production basket. Symbols absent here are assumed not
# held (delta logic treats them as fresh entries — no decoration).
#
# Use the ts_code with exchange suffix for CN (e.g. 600183.SH, 002518.SZ).
# Empty sections are fine.

us: {}
  # AMZN: 0.125
  # NVDA: 0.125
  # GOOGL: 0.125
  # TSM: 0.125

cn: {}
  # 600183.SH: 0.05
  # 002518.SZ: 0.05
