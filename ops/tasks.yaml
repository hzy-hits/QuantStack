  research.risk_regime_engine:
    # Hedge/Wedge/Confirm/Press/Capitulation regime classifier. Reads
    # bubble_hedge.json + capitulation_radar.json and emits a discrete state +
    # R multiplier that gates AI-infra basket sizing.
    # Runs AFTER bubble_hedge_radar (12:14) + capitulation_radar (12:15),
    # BEFORE main_strategy_v2 (12:25).
    group: research
    depends_on: [research.bubble_hedge_radar, research.capitulation_radar]
    schedule: "17 12 * * 1-5"
    cwd: .
    command:
