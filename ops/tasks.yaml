  research.capitulation_convex_radar:
    # Upside mirror of victim_put — convex value buys (oversold + evidence-
    # confirmed) every day, plus LEAPS-call suggestions for high-beta wash-out
    # names when capitulation fires. Runs AFTER capitulation_radar (12:15).
    group: research
    depends_on: [research.capitulation_radar]
    schedule: "16 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_capitulation_convex_radar.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.capitulation_convex_radar.log
