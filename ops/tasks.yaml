    # Daily point-in-time snapshot of AI-infra production-pool membership.
    # Rebuilds the ledger from git history + the live working tree so every
    # universe edit becomes a dated, immutable record. Runs late in the day,
    # after the discovery / universe-refresh tasks, so it captures the day's
    # final state. The strategy backtest reads this ledger to size each
    # historical day's basket point-in-time instead of with today's pool.
    group: research
    schedule: "50 12 * * 1-5"
