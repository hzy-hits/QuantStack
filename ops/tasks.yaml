version: 1

defaults:
  timezone: Asia/Shanghai
  timeout_minutes: 180

tasks:
  us.premarket:
    group: us
    schedule: "0 20 * * 1-5"
    cwd: quant-research-v1
    command: ["./scripts/run_full.sh", "--prod", "--premarket", "{ny_date}"]
    log: ops/logs/us.premarket.log
    legacy_log: quant-research-v1/logs/cron_premarket.log
    lock: ops/state/us.premarket.lock
    timeout_minutes: 240
    sends_email: true
    market: us
    session: premarket
    owner: us_pipeline
    outputs:
      - quant-research-v1/reports
      - quant-research-v1/logs

  us.postmarket:
    group: us
    schedule: "0 5 * * 2-6"
    cwd: quant-research-v1
    command: ["./scripts/run_full.sh", "--prod", "{ny_date}"]
    log: ops/logs/us.postmarket.log
    legacy_log: quant-research-v1/logs/cron_postmarket.log
    lock: ops/state/us.postmarket.lock
    timeout_minutes: 240
    sends_email: true
    market: us
    session: postmarket
    owner: us_pipeline
    outputs:
      - quant-research-v1/reports
      - quant-research-v1/logs

  intraday.index_refresh:
    group: us
    # Asia/Shanghai 21:30-04:00 (EDT) or 22:30-05:00 (EST) = US 9:30-16:00 ET.
    # Run every 30min during US trading hours (M-F US, so Mon-Sat in CST).
    # Overlapping hour ranges intentionally cover both DST variants.
    schedules:
      - "*/30 21-23 * * 1-5"
      - "*/30 0-5 * * 2-6"
    cwd: ""
    command: ["python3", "scripts/intraday/refresh_index_chains.py"]
    log: ops/logs/intraday.index_refresh.log
    lock: ops/state/intraday.index_refresh.lock
    timeout_minutes: 5
    sends_email: false
    market: us
    session: intraday
    owner: us_pipeline
    outputs:
      - reports/intraday

  cn.precompute_alpha:
    group: cn
    schedule: "20 7 * * 1-5"
    cwd: quant-research-cn
    env:
      QUANT_CN_REVIEW_BACKFILL_DAYS: "7"
    command: ["bash", "scripts/precompute_alpha.sh"]
    log: ops/logs/cn.precompute_alpha.log
    legacy_log: quant-research-cn/reports/logs/cron_precompute_alpha.log
    lock: ops/state/cn.precompute_alpha.lock
    timeout_minutes: 120
    sends_email: false
    market: cn
    session: precompute
    owner: cn_pipeline
    outputs:
      - quant-research-cn/reports/review_dashboard
      - data/strategy_backtest_history.duckdb

  cn.morning:
    group: cn
    schedule: "30 8 * * 1-5"
    cwd: .
    command:
      - ./target/release/quant-stack
      - daily
      - --date
      - "{cst_date}"
      - --markets
      - cn
      - --session
      - morning
      - --run-producers
      - --with-narrative
      - --send-reports
      - --delivery-mode
      - prod
      - --stack-root
      - "{stack_root}"
    log: ops/logs/cn.morning.log
    legacy_log: quant-research-cn/reports/logs/cron_morning.log
    lock: ops/state/cn.morning.lock
    timeout_minutes: 240
    sends_email: true
    market: cn
    session: morning
    owner: cn_pipeline
    outputs:
      - quant-research-cn/reports

  cn.evening:
    group: cn
    schedule: "0 18 * * 1-5"
    cwd: .
    command:
      - ./target/release/quant-stack
      - daily
      - --date
      - "{cst_date}"
      - --markets
      - cn
      - --session
      - evening
      - --run-producers
      - --with-narrative
      - --send-reports
      - --delivery-mode
      - prod
      - --stack-root
      - "{stack_root}"
    log: ops/logs/cn.evening.log
    legacy_log: quant-research-cn/reports/logs/cron_evening.log
    lock: ops/state/cn.evening.lock
    timeout_minutes: 240
    sends_email: true
    market: cn
    session: evening
    owner: cn_pipeline
    outputs:
      - quant-research-cn/reports

  cn.fetch.tushare:
    group: cn
    schedule: "0 16 * * 1-5"
    cwd: quant-research-cn
    command:
      - ./target/release/quant-cn
      - fetch
      - --source
      - tushare
      - --date
      - "{cst_date}"
      - --staging
      - data/staging/cn_tushare.duckdb
    log: ops/logs/cn.fetch.tushare.log
    lock: ops/state/cn.fetch.tushare.lock
    timeout_minutes: 30
    sends_email: false
    market: cn
    session: ingest
    owner: cn_ingest
    outputs:
      - quant-research-cn/data/staging/cn_tushare.duckdb

  cn.fetch.akshare:
    group: cn
    schedule: "5 16 * * 1-5"
    cwd: quant-research-cn
    command:
      - ./target/release/quant-cn
      - fetch
      - --source
      - akshare
      - --date
      - "{cst_date}"
      - --staging
      - data/staging/cn_akshare.duckdb
    log: ops/logs/cn.fetch.akshare.log
    lock: ops/state/cn.fetch.akshare.lock
    timeout_minutes: 20
    sends_email: false
    market: cn
    session: ingest
    owner: cn_ingest
    outputs:
      - quant-research-cn/data/staging/cn_akshare.duckdb

  cn.consolidate:
    group: cn
    schedule: "30 16 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/consolidate_raw.py
      - --market
      - cn
    log: ops/logs/cn.consolidate.log
    lock: ops/state/cn.consolidate.lock
    timeout_minutes: 15
    sends_email: false
    market: cn
    session: ingest
    owner: cn_ingest
    outputs:
      - quant-research-cn/data/quant_cn.duckdb

  cn.freshness_gate:
    group: cn
    schedule: "25 8 * * 1-5"
    cwd: .
    command:
      - python3
      - ops/freshness_gate.py
      - --market
      - cn
    log: ops/logs/cn.freshness_gate.log
    lock: ops/state/cn.freshness_gate.lock
    timeout_minutes: 5
    sends_email: false
    market: cn
    session: ingest
    owner: cn_ingest

  daily.cross_market_am:
    group: daily
    depends_on: [us.postmarket]
    schedule: "30 7 * * 1-6"
    cwd: .
    env:
      HERMES_BIN: /home/ubuntu/.local/bin/hermes
      CROSS_MARKET_SEND_EMAIL: "1"
      QUANT_EMAIL_PROVIDER: resend
      QUANT_DELIVERY_MODE: test
      QUANT_TEST_RECIPIENT: 13502448752hzy@gmail.com
      RESEND_ENV_FILE: /home/ubuntu/apps/multica/.env
    command:
      - quant-research-v1/.venv/bin/python
      - scripts/agents/run_cross_market_daily_shadow.py
      - --slot
      - am
      - --cn-date
      - "{cst_date}"
      - --agent-backend
      - hermes
      - --fallback-backend
      - auto
      - --timeout
      - "900"
    log: ops/logs/daily.cross_market_am.log
    lock: ops/state/daily.cross_market_am.lock
    timeout_minutes: 30
    sends_email: true
    market: all
    session: cross_market_am
    owner: hermes_daily
    outputs:
      - reports/review_dashboard/main_strategy_v2

  daily.cross_market_pm:
    group: daily
    depends_on: [research.main_strategy_v2_report]
    schedule: "30 18 * * 1-5"
    cwd: .
    env:
      HERMES_BIN: /home/ubuntu/.local/bin/hermes
      CROSS_MARKET_SEND_EMAIL: "1"
      QUANT_EMAIL_PROVIDER: resend
      QUANT_DELIVERY_MODE: test
      QUANT_TEST_RECIPIENT: 13502448752hzy@gmail.com
      RESEND_ENV_FILE: /home/ubuntu/apps/multica/.env
    command:
      - quant-research-v1/.venv/bin/python
      - scripts/agents/run_cross_market_daily_shadow.py
      - --slot
      - pm
      - --cn-date
      - "{cst_date}"
      - --agent-backend
      - hermes
      - --fallback-backend
      - auto
      - --timeout
      - "900"
    log: ops/logs/daily.cross_market_pm.log
    lock: ops/state/daily.cross_market_pm.lock
    timeout_minutes: 30
    sends_email: true
    market: all
    session: cross_market_pm
    owner: hermes_daily
    outputs:
      - reports/review_dashboard/main_strategy_v2

  weekly.us:
    group: weekly
    schedule: "30 9 * * 6"
    cwd: quant-research-v1
    command: ["./scripts/run_weekly.sh"]
    log: ops/logs/weekly.us.log
    legacy_log: quant-research-v1/logs/cron_weekly.log
    lock: ops/state/weekly.us.lock
    timeout_minutes: 180
    sends_email: true
    market: us
    session: weekly
    owner: us_pipeline
    outputs:
      - quant-research-v1/reports

  weekly.cn:
    group: weekly
    schedule: "0 10 * * 6"
    cwd: quant-research-cn
    command: ["bash", "scripts/weekly_pipeline.sh"]
    log: ops/logs/weekly.cn.log
    legacy_log: quant-research-cn/reports/logs/cron_weekly.log
    lock: ops/state/weekly.cn.lock
    timeout_minutes: 180
    sends_email: true
    market: cn
    session: weekly
    owner: cn_pipeline
    outputs:
      - quant-research-cn/reports

  research.ai_supply_chain_candidates:
    group: research
    schedule: "20 11 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/extract_ai_supply_chain_relationship_candidates.py
      - --as-of
      - "{cst_date}"
      - --lookback-days
      - "14"
    log: ops/logs/research.ai_supply_chain_candidates.log
    lock: ops/state/research.ai_supply_chain_candidates.lock
    timeout_minutes: 60
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/ai_supply_chain_candidates

  research.ai_infra_bfs_discovery_queue:
    group: research
    schedule: "30 11 * * 1-5"
    cwd: ai_infra
    command:
      - python3
      - scripts/generate_bfs_supply_chain_discovery_queue.py
    log: ops/logs/research.ai_infra_bfs_discovery_queue.log
    lock: ops/state/research.ai_infra_bfs_discovery_queue.lock
    timeout_minutes: 30
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - ai_infra/reports/bfs_supply_chain_discovery_queue_v1.csv
      - ai_infra/reports/bfs_supply_chain_discovery_queue_v1.md
      - ai_infra/notes/2026-05-13-chatgpt-pro-bfs-supply-chain-discovery-prompt.md

  research.ai_infra_expansion_candidates:
    group: research
    schedule: "35 11 * * 1-5"
    cwd: .
    command:
      - python3
      - ai_infra/scripts/generate_expansion_candidates.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.ai_infra_expansion_candidates.log
    lock: ops/state/research.ai_infra_expansion_candidates.lock
    timeout_minutes: 30
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - ai_infra/reports/expansion_candidates_v1.csv
      - ai_infra/reports/expansion_candidates_v1.md

  research.ai_infra_source_ingest:
    group: research
    schedule: "45 11 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/ingest_ai_source_documents.py
      - --as-of
      - "{cst_date}"
      - --max-docs
      - "20"
      - --timeout
      - "8"
    log: ops/logs/research.ai_infra_source_ingest.log
    lock: ops/state/research.ai_infra_source_ingest.lock
    timeout_minutes: 60
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - ai_infra/reports/source_document_tasks_v1.csv
      - ai_infra/reports/source_evidence_extracts_v1.csv
      - ai_infra/data/source_cache

  research.ai_infra_promotion_plan:
    group: research
    schedule: "55 11 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/promote_ai_infra_expansion_candidates.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.ai_infra_promotion_plan.log
    lock: ops/state/research.ai_infra_promotion_plan.lock
    timeout_minutes: 30
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - ai_infra/reports/expansion_candidates_promoted_v1.csv
      - ai_infra/reports/expansion_candidates_rejected_v1.json

  research.ai_supercycle_readiness:
    group: research
    schedule: "5 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/verify_ai_supercycle_readiness.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.ai_supercycle_readiness.log
    lock: ops/state/research.ai_supercycle_readiness.lock
    timeout_minutes: 30
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/ai_supercycle_readiness

  research.cn_index_ingest:
    group: research
    schedule: "0 6 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/ingest_cn_index_prices.py
      - --as-of
      - "{cst_date}"
      - --lookback-days
      - "365"
    log: ops/logs/research.cn_index_ingest.log
    lock: ops/state/research.cn_index_ingest.lock
    timeout_minutes: 15
    sends_email: false
    market: cn
    session: research
    owner: research_pipeline
    outputs:
      - quant-research-cn/data/quant_cn_report.duckdb

  research.cn_flow_signals:
    # Repair the CN flow signals (龙虎榜 / 北向 / 沪深股通十大) direct from
    # Tushare — the quant-research-cn Rust/AKShare fetch left top_list at 0
    # rows and northbound near-empty (~26% of flow_score weight broken).
    # Runs early so the data is in place before the CN analytics pass.
    group: research
    schedule: "0 6 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/ingest_cn_flow_signals.py
      - --end
      - "{cst_date}"
    log: ops/logs/research.cn_flow_signals.log
    lock: ops/state/research.cn_flow_signals.lock
    timeout_minutes: 20
    sends_email: false
    market: cn
    session: research
    owner: research_pipeline
    outputs:
      - quant-research-cn/data/quant_cn.duckdb

  research.satellite_index_ingest:
    group: research
    schedule: "5 6 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/ingest_satellite_index_prices.py
      - --as-of
      - "{cst_date}"
      - --lookback-days
      - "365"
    log: ops/logs/research.satellite_index_ingest.log
    lock: ops/state/research.satellite_index_ingest.lock
    timeout_minutes: 30
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - quant-research-v1/data/quant.duckdb

  research.source_review_readiness:
    group: research
    schedule: "6 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_source_review_readiness.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.source_review_readiness.log
    lock: ops/state/research.source_review_readiness.lock
    timeout_minutes: 10
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/ai_infra_source_review_readiness

  research.cn_ai_evidence_verify:
    # Verify CN AI-infra evidence from Tushare 主营业务构成 (fina_mainbz) —
    # replaces auto-stamped 原文已证明 boilerplate with real disclosed
    # segment-revenue evidence (or downgrades to 待原文核验 when no AI
    # segment is disclosed). Runs AFTER ai_infra_promotion_plan (11:55) so it
    # corrects any fresh auto-stamps, and BEFORE production_universe_refresh
    # (12:07) / main_strategy_v2 (12:25).
    group: research
    depends_on: [research.ai_infra_promotion_plan]
    schedule: "0 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/verify_cn_ai_evidence.py
    log: ops/logs/research.cn_ai_evidence_verify.log
    lock: ops/state/research.cn_ai_evidence_verify.lock
    timeout_minutes: 20
    sends_email: false
    market: cn
    session: research
    owner: research_pipeline
    outputs:
      - ai_infra/data/global_universe_v2.jsonl

  research.production_universe_refresh:
    # Derive the evidence-confirmed subset of the AI infra research universe
    # so the operator can see which names are eligible for the production
    # basket. The rankers themselves filter via the in-memory gate, so this
    # task is documentation-only — but it must run after readiness scoring
    # and BEFORE main_strategy_v2_report (12:25) so the snapshot reflects
    # today's promotions.
    group: research
    depends_on: [research.source_review_readiness]
    schedule: "7 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/generate_production_universe.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.production_universe_refresh.log
    lock: ops/state/research.production_universe_refresh.lock
    timeout_minutes: 5
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - ai_infra/reports/production_universe_v1.jsonl
      - ai_infra/reports/production_universe_v1.md

  research.ten_x_radar:
    group: research
    schedule: "12 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_ten_x_candidates.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.ten_x_radar.log
    lock: ops/state/research.ten_x_radar.lock
    timeout_minutes: 20
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/ai_infra_ten_x_radar

  research.evidence_card_drafts:
    group: research
    schedule: "9 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/scaffold_evidence_cards_from_readiness.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.evidence_card_drafts.log
    lock: ops/state/research.evidence_card_drafts.lock
    timeout_minutes: 10
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/ai_infra_evidence_card_drafts

  research.promotion_plan:
    group: research
    schedule: "10 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/derive_promotion_plan_from_readiness.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.promotion_plan.log
    lock: ops/state/research.promotion_plan.lock
    timeout_minutes: 10
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/ai_infra_promotion_plan

  research.ten_x_radar_strict:
    group: research
    schedule: "22 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/audit_production_basket_ai_universe.py
      - --as-of
      - "{cst_date}"
      - --strict
    log: ops/logs/research.ten_x_radar_strict.log
    lock: ops/state/research.ten_x_radar_strict.lock
    timeout_minutes: 5
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
      - ops/logs/research.ten_x_radar_strict.log

  research.fear_greed_ingest:
    group: research
    schedule: "5 8 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/ingest_fear_greed_index.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.fear_greed_ingest.log
    lock: ops/state/research.fear_greed_ingest.lock
    timeout_minutes: 5
    sends_email: false
    market: us
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/fear_greed

  research.options_anomaly_radar:
    group: research
    schedule: "7 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_options_anomaly_radar.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.options_anomaly_radar.log
    lock: ops/state/research.options_anomaly_radar.lock
    timeout_minutes: 10
    sends_email: false
    market: us
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/us_options_anomaly_radar

  research.wedge_instruments_ingest:
    group: research
    schedule: "10 6 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/ingest_wedge_instrument_prices.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.wedge_instruments_ingest.log
    lock: ops/state/research.wedge_instruments_ingest.lock
    timeout_minutes: 20
    sends_email: false
    market: us
    session: research
    owner: research_pipeline
    outputs:
      - quant-research-v1/data/quant.duckdb

  research.bubble_hedge_radar:
    group: research
    schedule: "14 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_bubble_hedge_radar.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.bubble_hedge_radar.log
    lock: ops/state/research.bubble_hedge_radar.lock
    timeout_minutes: 10
    sends_email: false
    market: us
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/bubble_hedge_radar

  research.victim_put_suggestions:
    # Pairs each bubble-hedge victim with concrete OTM put contracts (delta
    # -0.20 to -0.35, DTE 30-60 when available). Runs AFTER bubble_hedge_radar
    # because it reads victims from bubble_hedge.json.
    group: research
    depends_on: [research.bubble_hedge_radar]
    schedule: "16 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_victim_put_suggestions.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.victim_put_suggestions.log
    lock: ops/state/research.victim_put_suggestions.lock
    timeout_minutes: 5
    sends_email: false
    market: us
    session: research
    owner: research_pipeline
    outputs:
      - reports/review_dashboard/bubble_hedge_radar

  research.capitulation_radar:
    # 5-signal capitulation / bottom radar (VIX peak-rollover, HY OAS peak,
    # put/call extreme, volume exhaustion, high-beta leadership). Feeds the
    # risk-regime engine's 5th state (CAPITULATION). Runs AFTER
    # bubble_hedge_radar (12:14), BEFORE risk_regime_engine (12:17).
    group: research
    depends_on: [research.bubble_hedge_radar]
    schedule: "15 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/score_capitulation_radar.py
      - --as-of
      - "{cst_date}"
    log: ops/logs/research.capitulation_radar.log
