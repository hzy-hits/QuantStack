  research.main_strategy_v2_report:
    group: research
    depends_on: [research.risk_regime_engine, research.production_universe_refresh]
    schedule: "25 12 * * 1-5"
    cwd: .
    command:
      - python3
      - scripts/run_main_strategy_v2_report_pipeline.py
      - --date
      - "{cst_date}"
      - --ai-infra-mode
      # enforce_expand combines two contracts: (1) filter incoming candidates
      # to AI infra universe members AND (2) inject the full production pool
      # (原文已证明 / 合理推论 names) so the ranker always sees the
      # evidence-confirmed core (NVDA / AVGO / AMZN / GOOGL / MRVL / CRWV /
      # ORCL / TSM). Without the inject step, days where main_strategy_v2's
      # candidate filter only surfaces 待原文核验 radar names like
      # MU / KC / MTSI produce 0R after the secondary evidence gate trips.
      - enforce_expand
    log: ops/logs/research.main_strategy_v2_report.log
    lock: ops/state/research.main_strategy_v2_report.lock
    timeout_minutes: 60
    sends_email: false
    market: all
    session: research
    owner: research_pipeline
    outputs:
