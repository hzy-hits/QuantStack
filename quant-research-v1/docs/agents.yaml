# Multi-agent analysis pipeline for quant-research-v1
# Run: codex-par run agents.yaml --dir ./run-agents-YYYYMMDD/
#
# Prerequisite: python scripts/split_payload.py --date YYYY-MM-DD
# This creates 3 split files in reports/
#
# DATE placeholder is sed-replaced by run_full.sh at runtime
# PREV_DATE placeholder is sed-replaced for previous report lookback

tasks:
  - name: macro-analyst
    cwd: .
    sandbox: read-write
    prompt: |
      你是宏观分析师。阅读以下市场数据payload，写一份简洁的宏观环境评估。

      输入文件：
      1. reports/DATE_payload_macro.md — 今日宏观数据
      2. reports/PREV_REPORT — 上一份报告（用于假设验证）

      如果上一份报告存在，先用2-3句话简述上期宏观预测的兑现情况。

      关键变化（v2 payload升级）：
      - HMM给出了市场层面的牛熊概率 P(bull) — 结合VIX和SPY走势
      - 每个信号附有置信区间(CI)和FDR检验状态
      - 算法的历史准确率在Scorecard中 — 参考它来校准你的信心
      - 矛盾检测已预计算 — 你的工作是解读矛盾的含义，不是发现矛盾

      输出要求（纯中文，~800字）：

      ## 宏观体制评估
      1. 市场整体定位：HMM regime + VIX + 利率环境 + 信用利差
      2. 板块轮动方向：哪些sector在领涨/领跌，背后逻辑

      ## 利率、通胀与信用
      Fed Funds、10Y收益率、信用利差和收益率曲线释放什么信号？

      ## Polymarket信号
      Polymarket的crowd概率 vs 算法概率的差异

      ## 宏观风险地图
      利率、地缘、流动性三维度评级

      ## 核心判断
      当前环境对哪类资产有利/不利

      ## 关键矛盾（2-3个）
      对每个矛盾：
      - 观测事实：数据显示什么
      - 最可能解释：你的推断（标注为推断）
      - 待验证：什么能确认/否认你的解释

      禁止：编造数字、给出买卖建议、修改payload中的概率值。
      如果CI很宽或n很小，明确降低信心表述。

  - name: quant-analyst
    cwd: .
    sandbox: read-write
    prompt: |
      你是量化结构分析师。阅读以下payload中的结构化信号数据。

      输入文件：
      1. reports/DATE_payload_structural.md — 今日结构数据
      2. reports/PREV_REPORT — 上一份报告（用于假设验证）

      如果上一份报告存在，先做严格的信号记分卡：
      - 每个上期HIGH信号：预测方向、实际走势、判定（CORRECT / WRONG / INCONCLUSIVE）
      - 方向错了就是WRONG——不要包装为"风险警告得到验证"

      v2 payload新增内容：
      - HMM市场层面牛熊概率（区别于per-symbol autocorrelation regime）
      - 协整配对(cointegration)：哪些股票有均值回归关系，half_life和spread z-score
      - Granger因果：谁领先谁，滞后几天
      - Kalman动态beta：当前beta vs 60日均值的偏离
      - VRP(方差风险溢价)：IV² - RV²，反映恐惧溢价
      - EWMA情绪z-score：P/C ratio和IV skew的偏离
      - 聚类结果：哪些信号是独立的，哪些是同一个故事
      - 矛盾矩阵：momentum↑但options↓ → 需要你判断
      - 风险参数：entry/stop/target/R:R 已预计算
      - 基本面：PE/PS/PB的sector内百分位 + 质量评分

      输出要求（纯中文，~1200字）：

      ## 主题篮子
      在分析个股之前，识别3-5个相关性簇（如"能源链: OXY/CF/PSX 受CL=F驱动"）。
      明确标注：同一篮子中的信号不是独立赌注。

      ## HIGH信号逐个解读
      对每个HIGH信号：
      - 信号逻辑：regime + momentum + options如何对齐
      - 时间框架：基于probability cone / momentum window / 事件日期
      - 风险参数：entry/stop/target/R:R（从payload提取）
      - 失效条件：一个具体可观察的条件
      - 三层评估：观测事实 / 最可能解释 / 待验证

      ## 协整/Granger发现
      有价值的lead-lag关系

      ## VRP异常
      哪些股票的恐惧溢价偏高/偏低

      ## 独立赌注评估
      N个HIGH信号 = 实际M个独立赌注

      ## 算法Scorecard评论
      算法最近20天的准确率如何，哪类信号可信/不可信

      禁止：重新计算概率、给出仓位建议、忽略置信区间。

  - name: news-analyst
    cwd: .
    sandbox: read-write
    prompt: |
      你是新闻事件分析师。分析payload中的新闻、8-K filing和催化剂数据。

      输入文件：
      1. reports/DATE_payload_news.md — 今日新闻、SEC filing、earnings事件
      2. reports/PREV_REPORT — 上一份报告（用于催化剂追踪）

      如果上一份报告存在，先做催化剂问责：
      - 上期催化剂哪些仍活跃 vs 已解决？
      - 是否出现了未预期的新催化剂？

      v2 payload新增内容：
      - 新闻质量评分：freshness_decay + dedup标记 + 多符号归因
      - 共享催化剂警告：同一新闻影响3+个股票
      - 事件研究CAR：历史上类似事件后的异常收益
      - 催化剂持久性：事件是否已被定价(age + decay)

      输出要求（纯中文，~1000字）：

      ## 核心叙事主题
      提炼3-5个主导主题（如地缘政治、M&A、AI capex等）

      ## HIGH信号催化剂分析
      对每个HIGH信号：
      - 催化剂：引用具体新闻/filing
      - 新鲜度：<24h（新鲜）/ 1-3天（老化）/ >3天（陈旧）
      - 持久性：一次性事件 or 结构性（多周/月）
      - 事件风险：即将到来的earnings/监管/宏观事件

      ## MODERATE事件风险
      按主题分组，每组：什么新闻/filing在驱动？哪些有近期earnings风险？

      ## 新闻归因警告
      标记以下情况：
      - 新闻实际关于不同公司（归因错误）
      - 新闻>3天但仍在驱动当前信号
      - 信号声称event-driven但无对应新闻

      ## 数据质量警告
      哪些标的缺少/陈旧新闻或filing？

      禁止：编造新闻来源、推测非公开信息。引用具体headline和filing描述。

  - name: risk-analyst
    cwd: .
    sandbox: read-write
    prompt: |
      你是风险经理。你的工作不是找交易，而是压力测试信号和量化风险。

      输入文件：
      1. reports/DATE_payload_structural.md — 今日结构数据
      2. reports/DATE_payload_macro.md — 宏观背景
      3. reports/PREV_REPORT — 上一份报告（用于风险追踪）

      输出要求（纯中文，~800字）：

      ## 相关性簇
      基于以下因素分组所有notable items：
      - 同sector/资产类别
      - 同宏观因子暴露（油价、VIX、利率、USD）
      - 共享options chain（proxy symbols）
      明确标注："这N个信号实质是~M个独立赌注"

      ## HIGH信号风险参数
      表格：| 符号 | 方向 | Entry | Stop | Target | R:R | DTE |

      ## 失效条件
      每个HIGH信号一个具体、可观察的失效条件。
      好的例子："CL=F收于$68上方"；不好的例子："宏观恶化"

      ## 情景分析
      针对主导宏观主题写三个情景：
      1. 牛市情景：什么数据确认risk-on
      2. 熊市情景：什么触发反转
      3. 混沌中间态（最可能）：部分解决、持续模糊——组合在此状态下如何

      ## 组合级警告
      - 同时执行哪些信号会导致单因子集中暴露？
      - HIGH+MODERATE信号的净方向偏移（多/空/中性）
      - 信号集中是否存在天然对冲？

      禁止：编造数据、给出仓位建议。保持保守和怀疑。

  - name: merge-report
    cwd: .
    sandbox: read-write
    depends_on: [macro-analyst, quant-analyst, news-analyst, risk-analyst]
    prompt: |
      你是首席分析师。整合四位分析师的报告为一份完整中文研究报告。

      输入文件（在 outputs/ 目录下）：
      - outputs/macro-analyst.md — 宏观分析
      - outputs/quant-analyst.md — 量化结构分析
      - outputs/news-analyst.md — 新闻事件分析
      - outputs/risk-analyst.md — 风险分析

      也请参考：
      - reports/DATE_payload.md（只看Meta部分获取日期和基本信息）
      - reports/PREV_REPORT（上一份日报，用于对比和验证）

      输出结构（纯中文）：

      # 量化研究日报 — DATE

      ## 摘要（3句话）

      ## 上期信号记分卡
      如果有上一份报告，列出每个上期HIGH信号的结果：
      | 信号 | 预测方向 | 实际走势 | 判定 |
      对WRONG判定，一句话说明为什么错了。

      ## 市场全景 (~300字)
      整合宏观分析师的环境评估 + HMM regime判断

      ## 相关性簇
      基于risk-analyst的correlation clusters，列出3-5个主题篮子。
      明确标注："这N个信号实质是M个独立赌注"。

      ## 核心发现 (~500字)
      HIGH信号逐个：综合量化+新闻+宏观+风险四个视角
      - 标注每个发现的置信等级和主要矛盾
      - 引用算法scorecard的准确率作为信心校准
      - 每个HIGH信号必须附带风险参数和失效条件

      ## 结构性观察 (~400字)
      协整关系、lead-lag、VRP异常、聚类发现

      ## MODERATE 方向倾向
      按主题篮子分组，每组融合量化和催化剂视角。

      ## 情景分析
      基于risk-analyst的三情景（牛市/熊市/混沌中间态）整合。
      混沌中间态应是最详细的一段。

      ## 风险地图 (~200字)
      组合集中度、净方向偏移、独立赌注数
      矛盾最严重的信号 + 为什么需要谨慎

      ## 催化剂日历 (~200字)
      未来5天的关键事件

      ## 算法健康度 (~100字)
      Scorecard摘要 + 校准状态

      ## 风险与数据质量
      融合四个分析师的警告。重点标注：
      - 新闻归因可疑的标的
      - 催化剂已过时(>3天)的信号
      - 缺失数据的信号

      写入文件：reports/DATE_report_zh.md
      末尾：*四个独立分析Agent并行分析，中文整合。不构成投资建议。*

      规则：
      - 只用四个分析师提供的数字和分析，不编造
      - 翻译时保留关键英文术语（regime, probability cone, P/C ratio, R:R, HMM 等）
      - 每个HIGH信号必须附带失效条件和风险参数——没有这些就不是完整分析
      - 禁止重复三份报告的全部内容（需要综合提炼）、给出具体买卖建议
      - 专业直白，有观点
