version: 1
contract: >
  Machine-readable research queue for the AI Infra Investment Mandate.
  Theme membership is research guidance only. It does not create trade R and
  does not confirm supplier/customer relationships.
themes:
  - theme_id: hbm_structural_supercycle
    priority: 1
    title: HBM structural supercycle
    deep_dive_doc: docs/AI_INFRA_HBM_COWOS_DEEP_DIVE.md
    evidence_status: source_review_gated
    layer_refs: [ai_memory_storage, ai_chip_equipment_materials_packaging]
    research_question: Is HBM a short supply mismatch or a long-term AI accelerator memory standard?
    current_thesis: >
      HBM has likely moved beyond a 2-3 year supply mismatch and is becoming a
      structural memory standard for high-end AI accelerators, but this does not
      remove ASP, margin, oversupply, or yield-normalization risk.
    source_review_focus:
      - JEDEC HBM4 standard release
      - NVIDIA H200, Blackwell Ultra, Rubin and Vera Rubin official specifications
      - AMD Instinct MI325X and MI355X official specifications
      - SK hynix, Samsung and Micron HBM3E/HBM4/HBM4E product, press and IR materials
      - Hanmi, ASMPT, BESI, SUSS, TOWA, DISCO, Advantest and Teradyne HBM-related filings or product disclosures
      - Chroma, MPI, WinWay, Leeno, ISC, TSE, Ibiden, Shinko, Unimicron and Resonac HBM-specific revenue or qualification evidence
    company_pool: [SK hynix, Samsung, Micron, Hanmi, ASMPT, Advantest, TOWA, BESI, SUSS, Ibiden, Shinko, Ajinomoto, Resonac, Camtek]
    key_metrics: [HBM revenue, HBM qualification, HBM stack height, TCB orders, hybrid bonding orders, memory tester revenue, substrate revenue]
    disconfirming_evidence: [HBM supply expands faster than AI accelerator demand, one-off equipment orders, HBM4 route reduces equipment or material value]
  - theme_id: cowos_advanced_packaging_bottleneck
    priority: 1
    title: CoWoS and advanced packaging capacity bottleneck
    deep_dive_doc: docs/AI_INFRA_HBM_COWOS_DEEP_DIVE.md
    evidence_status: source_review_gated
    layer_refs: [ai_chip_equipment_materials_packaging]
    research_question: Does the AI chip bottleneck shift from TSMC CoWoS to substrate, interposer, equipment, or test?
    current_thesis: >
      CoWoS and advanced packaging remain AI accelerator shipment bottlenecks,
      but the constraint is no longer a single TSMC capacity point; it is TSMC as
      the gatekeeper plus parallel pressure in high-end substrate, T-glass,
      TCB/hybrid bonding, temporary bonding, dicing, molding, inspection,
      metrology and selected test capacity.
    source_review_focus:
      - TSMC earnings call, annual report, CoWoS/advanced packaging and capex commentary
      - ASE and Amkor advanced packaging, test, AI/HPC and capex disclosures
      - Ibiden, AT&S, Shinko, Unimicron, Nan Ya PCB and Kinsus high-end substrate disclosures
      - BESI, SUSS, ASMPT, TOWA and DISCO equipment order and shipment commentary
      - Camtek and Nova CoWoS-like, HBM, chiplet, hybrid bonding, RDL/TSV and metrology disclosures
      - Advantest, Teradyne, Amkor and ASE final-test or SLT evidence before calling test a primary bottleneck
    company_pool: [TSMC, ASE, Amkor, Ibiden, Shinko, Unimicron, Nan Ya PCB, Kinsus, AT&S, BESI, SUSS, ASMPT, TOWA, Disco, Camtek, Nova]
    key_metrics: [CoWoS capacity, advanced packaging revenue, substrate ASP, equipment orders, book-to-bill, interposer size, HBM stack count]
    disconfirming_evidence: [CoWoS capacity catches up, packaging pricing absorbed by foundries, substrate shortage clears]
  - theme_id: ai_hbm_test_metrology
    priority: 1
    title: AI and HBM test, probe, and metrology
    layer_refs: [ai_chip_equipment_materials_packaging, ai_memory_storage]
    research_question: Does AI chip complexity extend test time and create tester/probe/inspection bottlenecks?
    company_pool: [Advantest, Teradyne, Chroma, MPI, WinWay, FormFactor, Technoprobe, Leeno, ISC, TSE, Camtek, Nova, Onto, KLA]
    key_metrics: [SoC tester revenue, memory tester revenue, probe card ASP, HBM test time, advanced packaging inspection revenue, yield improvement]
    disconfirming_evidence: [test orders pulled forward, test time compressed by process improvements, customer internalization]
  - theme_id: optical_cpo_800g_1p6t
    priority: 1
    title: 800G to 1.6T to CPO optical interconnect
    layer_refs: [ai_networking_optical_cpo]
    research_question: Does AI cluster scale turn optics from a telecom cycle into a compute-network cycle?
    company_pool: [Coherent, Lumentum, Broadcom, Marvell, Credo, MACOM, Semtech, InnoLight, Zhongji Innolight, Eoptolink, Fabrinet, Sivers, IQE, Tower, Corning]
    key_metrics: [800G shipment, 1.6T shipment, laser capacity, DSP ASP, power per bit, CPO design wins, hyperscaler qualification]
    disconfirming_evidence: [CPO delayed, pluggable optics life extends, optical module price war, DSP displaced by LPO or CPO]
  - theme_id: rack_scale_connectivity
