    disconfirming_evidence: [ASIC only replaces narrow workloads, weak software ecosystem, NVIDIA retains system-level advantage, single-customer pricing pressure]
  - theme_id: neocloud_unit_economics_credit_risk
    priority: 2
    title: NeoCloud unit economics and credit risk
    layer_refs: [ai_datacenter_edge_infra, ai_compute_accelerators]
