    layer_refs: [ai_compute_accelerators, ai_chip_equipment_materials_packaging]
    research_question: Do hyperscaler ASICs shift value from GPU vendors into design, EDA/IP, HBM, CoWoS, and networking?
    company_pool: [Broadcom, Marvell, Alchip, GUC, Faraday, Arm, Rambus, Synopsys, Cadence, TSMC, ASE, AWS, Google, Microsoft, Meta]
